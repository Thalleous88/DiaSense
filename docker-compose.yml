services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: diasense
      POSTGRES_PASSWORD: diasense
      POSTGRES_DB: diasense
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diasense"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
